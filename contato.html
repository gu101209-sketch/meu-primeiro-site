<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <style>
        .head{
            text-align: center;
        }
        .main{
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="head">
        <h1>Formulário de Contato</h1>
        <br><br>
        <p>Deixe-nos saber suas perguntas, sugestões ou dúvidas, preenchendo o formulário de contato abaixo.</p>
    </header>

    <hr>
    <br><br>
    <main class="main">
        <form>
            <label for="nome">Nome:</label>
            <input id="nome" type="text" placeholder="Insira seu nome" name="nome" required>

            <br><br>

            <label for="sobrenome">Sobrenome:</label>
            <input id="sobrenome" type="text" placeholder="Insira seu sobrenome" name="sobrenome" required>

            <br><br>

            <label for="email">Email:</label>

            <br><br>

            <label for="telefone">Telefone:</label>
            <input id="telefone" type="tel" placeholder="Insira seu Telefone" name="telefone" required>

            <br><br>
            <label for="mensagem">Mensagem:</label>
            <textarea name="mensagem" placeholder="Crítica, reclamação, elogio, sugestão etc..." rows="15" cols="55" required=></textarea>
            <br><br>
            <a href="index.html" >Voltar para a Página Inicial</a>
        </form>
    </main>
    
</body>

</html>
